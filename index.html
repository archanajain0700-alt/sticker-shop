<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Shop - Fun Stickers Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.2em;
            color: #666;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sticker-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .sticker-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .sticker-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .sticker-card:hover::before {
            left: 100%;
        }

        .sticker-emoji {
            font-size: 6em;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.3));
        }

        .sticker-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .sticker-desc {
            color: #666;
            font-size: 1em;
            margin-bottom: 20px;
        }

        .price {
            font-size: 1.8em;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .buy-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.4);
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238, 90, 36, 0.6);
        }

        .search-bar {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 3px solid #ddd;
            border-radius: 30px;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2em;
            color: #999;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .sticker-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎉 Sticker Shop 🎉</h1>
        <p>Collect the coolest stickers for your messages!</p>
    </div>

    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Search stickers..." id="searchInput">
    </div>

    <div class="filter-buttons">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="animals">Animals</button>
        <button class="filter-btn" data-category="food">Food</button>
        <button class="filter-btn" data-category="emotions">Emotions</button>
        <button class="filter-btn" data-category="objects">Objects</button>
    </div>

    <div class="sticker-grid" id="stickerGrid">
        <!-- Stickers will be populated by JavaScript -->
    </div>

    <script>
        const stickers = [
            { name: "Happy Cat", emoji: "😻", category: "animals", desc: "Perfect for cat lovers!", price: 0.99 },
            { name: "Pizza Party", emoji: "🍕", category: "food", desc: "Who doesn't love pizza?", price: 1.49 },
            { name: "Super Laugh", emoji: "😂", category: "emotions", desc: "When something's hilarious!", price: 0.79 },
            { name: "Rocket Ship", emoji: "🚀", category: "objects", desc: "To the moon and back!", price: 1.29 },
            { name: "Dancing Penguin", emoji: "🐧💃", category: "animals", desc: "Party animal!", price: 1.19 },
            { name: "Ice Cream", emoji: "🍦", category: "food", desc: "Sweet treat time!", price: 0.89 },
            { name: "Love Heart", emoji: "💕", category: "emotions", desc: "Spread the love!", price: 0.69 },
            { name: "Magic Wand", emoji: "✨", category: "objects", desc: "Make some magic!", price: 1.09 },
            { name: "Sleepy Owl", emoji: "🦉😴", category: "animals", desc: "Night night!", price: 0.99 },
            { name: "Taco Tuesday", emoji: "🌮", category: "food", desc: "Every day is taco day!", price: 1.39 },
            { name: "Cool Sunglasses", emoji: "😎", category: "emotions", desc: "Too cool for school!", price: 0.89 },
            { name: "Hot Air Balloon", emoji: "🎈", category: "objects", desc: "Adventure awaits!", price: 1.49 }
        ];

        const stickerGrid = document.getElementById('stickerGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        function createStickerCard(sticker) {
            return `
                <div class="sticker-card" data-category="${sticker.category}" data-name="${sticker.name.toLowerCase()}">
                    <span class="sticker-emoji">${sticker.emoji}</span>
                    <div class="sticker-name">${sticker.name}</div>
                    <div class="sticker-desc">${sticker.desc}</div>
                    <div class="price">$${sticker.price}</div>
                    <button class="buy-btn" onclick="buySticker('${sticker.name}')">🛒 Buy Now</button>
                </div>
            `;
        }

        function renderStickers(filteredStickers = stickers) {
            stickerGrid.innerHTML = filteredStickers.map(createStickerCard).join('');
        }

        function filterStickers(category = 'all') {
            let filtered = stickers;
            
            if (category !== 'all') {
                filtered = stickers.filter(sticker => sticker.category === category);
            }
            
            renderStickers(filtered);
        }

        function buySticker(name) {
            alert(`🎉 Purchased "${name}" for your sticker collection! Thanks for shopping! 🛒✨`);
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = stickers.filter(sticker => 
                sticker.name.toLowerCase().includes(searchTerm) ||
                sticker.desc.toLowerCase().includes(searchTerm)
            );
            renderStickers(filtered);
        });

        // Filter buttons
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterStickers(btn.dataset.category);
            });
        });

        // Initial render
        renderStickers();
    </script>
</body>
</html>
